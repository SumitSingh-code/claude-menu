<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ashoka Hotel & Restaurant – Jind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E5C87A;
  --gold-dim: #8A6E30;
  --bg: #0A0A0A;
  --bg2: #111111;
  --bg3: #1A1A1A;
  --surface: #181818;
  --border: #2A2A2A;
  --text: #F0EAD6;
  --text2: #A89878;
  --text3: #6A5A3A;
  --veg: #22C55E;
  --radius: 10px;
  --tab-h: 50px;
  --cart-h: 64px;
  --header-bg: rgba(5, 5, 5, 0.85); /* Glassmorphism background */
}
[data-theme="light"] {
  --bg: #FAF7F0;
  --bg2: #F5F0E8;
  --bg3: #EDE8DC;
  --surface: #FFFFFF;
  --border: #E0D8C8;
  --text: #1A1408;
  --text2: #6B5A30;
  --text3: #A89060;
  --header-bg: rgba(250, 247, 240, 0.85); /* Light mode glass */
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Josefin Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}

/* --- NEW ULTRA-PREMIUM HEADER ARCHITECTURE --- */
#main-header {
  position: sticky;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: var(--header-bg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s ease, border-color 0.3s ease;
  display: flex;
  flex-direction: column;
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  min-height: 60px;
}

.left-actions, .right-actions {
  display: flex;
  gap: 8px;
  flex: 1; /* Ensures perfect mathematical centering for the brand */
}
.right-actions { justify-content: flex-end; }

.center-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 2;
  text-align: center;
}

.brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.05em;
  line-height: 1;
  margin: 0;
}

.brand-sub {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  color: var(--text2);
  text-transform: uppercase;
  margin-top: 5px;
}

/* 44x44 Touch Targets for Mobile */
.icon-btn {
  background: none;
  border: none;
  color: var(--gold);
  min-width: 44px;
  min-height: 44px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  font-weight: 600;
  transition: background 0.2s, transform 0.2s;
}
.icon-btn:active { background: rgba(201, 168, 76, 0.1); transform: scale(0.95); }

/* Collapsible Section (Tagline & Search) */
.collapsible-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  max-height: 200px; /* Large enough to hold content */
  opacity: 1;
  transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease, margin 0.3s ease;
}

/* Scroll State: Hides tagline and search smoothly */
#main-header.scrolled .collapsible-section {
  max-height: 0;
  opacity: 0;
  pointer-events: none;
}

.hero-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 150px;
  margin: 12px auto 8px;
}
.hero-divider span { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent); }
.hero-divider em { color: var(--gold); font-size: 0.7rem; font-style: normal; }

.brand-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.05rem;
  color: var(--text2);
  margin-bottom: 8px;
}

/* Slim Search Bar */
.search-container {
  width: 100%;
  padding: 0 16px 16px;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.3s ease;
}
.search-container.active {
  max-height: 70px;
  opacity: 1;
}

#menu-search {
  width: 100%;
  background: rgba(128, 128, 128, 0.1);
  border: 1px solid rgba(201, 168, 76, 0.3);
  color: var(--text);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.95rem;
  padding: 12px 18px;
  border-radius: 24px; /* Premium pill shape */
  outline: none;
  transition: border-color 0.3s, background 0.3s;
}
#menu-search:focus { border-color: var(--gold); background: rgba(128, 128, 128, 0.15); }
#menu-search::placeholder { color: var(--text3); }

/* Sticky Category Tabs */
#tabs-wrap {
  width: 100%;
  height: var(--tab-h);
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  white-space: nowrap;
  border-top: 1px solid rgba(128, 128, 128, 0.1);
}
#tabs-wrap::-webkit-scrollbar{display:none}
#tabs{display:inline-flex;align-items:center;height:100%;padding:0 12px;gap:4px}
.tab-btn{display:inline-flex;align-items:center;height:34px;padding:0 14px;border-radius:20px;border:1px solid transparent;background:none;color:var(--text2);font-family:'Josefin Sans',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab-btn.active{background:var(--gold);color:#0A0A0A;border-color:var(--gold)}

/* MAIN CONTENT ADJUSTMENT */
#main{padding-top: 16px; padding-bottom:calc(var(--cart-h) + 24px);min-height:100vh}

/* SECTION */
.menu-section{padding:0 16px 8px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--gold);padding:20px 0 6px;letter-spacing:.02em}
.section-line{height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent);margin-bottom:12px}

/* ITEM */
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.menu-item:last-child{border-bottom:none}
.item-veg{width:14px;height:14px;border:1.5px solid var(--veg);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.item-veg::after{content:'';width:7px;height:7px;background:var(--veg);border-radius:50%;display:block}
.item-info{flex:1;min-width:0}
.item-name{font-size:.92rem;font-weight:600;letter-spacing:.02em;line-height:1.3;color:var(--text)}
.item-desc{font-size:.72rem;color:var(--text2);margin-top:2px;line-height:1.4;font-weight:300}
.item-price{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;color:var(--gold);white-space:nowrap;margin-right:10px;flex-shrink:0}
.item-ctrl{flex-shrink:0}
.add-btn{background:none;border:1.5px solid var(--gold);color:var(--gold);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:1.4rem;line-height:1;display:flex;align-items:center;justify-content:center;font-weight:300;transition:background .15s}
.add-btn:active{background:var(--gold);color:#000}
.qty-ctrl{display:flex;align-items:center;gap:0;border:1.5px solid var(--gold);border-radius:8px;overflow:hidden}
.qty-btn{background:none;border:none;color:var(--gold);width:32px;height:34px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;font-weight:700}
.qty-btn:active{background:var(--gold);color:#000}
.qty-num{width:28px;text-align:center;font-weight:700;font-size:.9rem;color:var(--text);background:var(--bg3)}

/* CART BAR */
#cart-bar{position:fixed;bottom:0;left:0;right:0;height:var(--cart-h);background:var(--gold);display:none;align-items:center;justify-content:space-between;padding:0 20px;cursor:pointer;z-index:200;transition:transform .25s}
#cart-bar.show{display:flex}
.cart-bar-left{display:flex;flex-direction:column}
.cart-bar-count{font-size:.72rem;letter-spacing:.1em;font-weight:600;color:#3A2800;text-transform:uppercase}
.cart-bar-label{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:#000}
.cart-bar-total{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:#000}
.cart-bar-arrow{font-size:1.3rem;color:#3A2800}

/* CART OVERLAY */
#cart-overlay{position:fixed;inset:0;z-index:300;display:none;flex-direction:column}
#cart-overlay.show{display:flex}
.cart-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.7)}
.cart-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.cart-header{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.cart-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--gold)}
.close-btn{background:var(--bg3);border:none;color:var(--text2);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center}
.cart-items{flex:1;overflow-y:auto;padding:12px 20px}
.cart-empty{text-align:center;padding:40px 20px;color:var(--text2);font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.cart-item-name{flex:1;font-size:.88rem;font-weight:600;color:var(--text)}
.cart-item-price{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--gold);margin-right:8px}
.cart-footer{padding:16px 20px;border-top:1px solid var(--border)}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cart-total-label{font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);font-weight:600}
.cart-total-val{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--gold)}
.order-btns{display:flex;gap:10px}
.wa-btn{flex:1;background:var(--gold);color:#000;border:none;height:52px;border-radius:var(--radius);font-family:'Josefin Sans',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s}
.wa-btn:active{opacity:.85}
.email-btn{background:none;border:1.5px solid var(--border);color:var(--text2);height:52px;border-radius:var(--radius);font-family:'Josefin Sans',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:0 16px;white-space:nowrap}

/* CUSTOMER MODAL */
#cust-modal{position:fixed;inset:0;z-index:400;display:none;align-items:flex-end;justify-content:center}
#cust-modal.show{display:flex}
.cust-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.8)}
.cust-box{position:relative;background:var(--bg2);border-radius:20px 20px 0 0;width:100%;padding:28px 24px 32px;animation:slideUp .3s ease}
.cust-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:20px}
.cust-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Josefin Sans',sans-serif;font-size:.95rem;padding:14px 16px;border-radius:var(--radius);outline:none;margin-bottom:12px;transition:border-color .2s}
.cust-input:focus{border-color:var(--gold)}
.cust-input::placeholder{color:var(--text3)}
textarea.cust-input { resize: none; height: 80px; font-family: inherit; }
.cust-go{width:100%;background:var(--gold);color:#000;border:none;height:52px;border-radius:var(--radius);font-family:'Josefin Sans',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;margin-top:4px}

/* SCROLL TO TOP */
#scroll-top{position:fixed;bottom:calc(var(--cart-h) + 16px);right:16px;width:44px;height:44px;background:var(--bg3);border:1px solid var(--border);border-radius:50%;color:var(--text2);font-size:1.1rem;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:150}
#scroll-top.show{display:flex}
</style>
</head>
<body>

<header id="main-header">
  <div class="top-bar">
    <div class="left-actions">
      <button class="icon-btn" id="search-toggle" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </button>
    </div>
    
    <div class="center-brand">
      <h1 class="brand-name">Ashoka</h1>
      <span class="brand-sub">Hotel &amp; Restaurant • Jind</span>
    </div>
    
    <div class="right-actions">
      <button class="icon-btn" id="lang-btn" title="Translate">EN / हि</button>
      <button class="icon-btn" id="theme-btn" aria-label="Toggle Theme">
        <svg id="theme-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      </button>
    </div>
  </div>

  <div class="collapsible-section" id="header-collapsible">
    <div class="hero-divider"><span></span><em>✦</em><span></span></div>
    <p class="brand-tagline" id="ui-tagline">Fine Dining &amp; Room Service</p>
    
    <div class="search-container" id="search-container">
      <input type="text" id="menu-search" placeholder="Search for food (e.g. Pizza, Dal...)" autocomplete="off">
    </div>
  </div>

  <div id="tabs-wrap"><div id="tabs"></div></div>
</header>

<div id="main">
  <div id="menu-root"></div>
</div>

<div id="cart-bar">
  <div class="cart-bar-left">
    <span class="cart-bar-count" id="cb-count">0 items</span>
    <span class="cart-bar-label" id="ui-view-cart">View Cart</span>

  <span class="cart-bar-total" id="cb-total">₹0</span>
  <span class="cart-bar-arrow">›</span>
</div>

<div id="cart-overlay">
  <div class="cart-backdrop" id="cart-backdrop"></div>
  <div class="cart-sheet">
    <div class="cart-header">
      <span class="cart-title" id="ui-your-order">Your Order</span>
      <button class="close-btn" id="cart-close">✕</button>
    </div>
    <div class="cart-items" id="cart-items-list"></div>
    <div class="cart-footer">
      <div class="cart-total-row">
        <span class="cart-total-label" id="ui-total">Total</span>
        <span class="cart-total-val" id="cart-grand-total">₹0</span>
      </div>
      <div class="order-btns">

          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          <span id="ui-wa-btn">Order on WhatsApp</span>
        </button>
        <button class="email-btn" id="email-btn"><span id="ui-email-btn">✉ Email</span></button>
      </div>
    </div>
  </div>
</div>

<div id="cust-modal">
  <div class="cust-backdrop" id="cust-backdrop"></div>
  <div class="cust-box">
    <div class="cust-title" id="ui-modal-title">Your Details</div>
    <input class="cust-input" id="cust-name" type="text" placeholder="Your Name" autocomplete="name">
    <input class="cust-input" id="cust-table" type="text" placeholder="Table No. / Room No.">
    <textarea class="cust-input" id="cust-notes" placeholder="Special Request for the Chef (e.g., less spicy, extra ketchup)"></textarea>
    <button class="cust-go" id="cust-confirm">Place Order →</button>
  </div>
</div>

<button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
</button>

<script>
// CURRENT LANGUAGE STATE
let currentLang = 'en';

// UI STATIC TRANSLATIONS
const UI_LANG = {
  "ui-tagline": { en: "Fine Dining & Room Service", hi: "फाइन डाइनिंग और रूम सर्विस" },

  "ui-total": { en: "Total", hi: "कुल" },
  "ui-wa-btn": { en: "Order on WhatsApp", hi: "व्हाट्सएप पर ऑर्डर करें" },
  "ui-email-btn": { en: "✉ Email", hi: "✉ ईमेल" },
  "ui-modal-title": { en: "Your Details", hi: "आपके विवरण" },
  "cust-confirm": { en: "Place Order →", hi: "ऑर्डर प्लेस करें →" },
  "lang-btn": { en: "EN / हि", hi: "हि / EN" }
};
const PLACEHOLDERS_LANG = {
  "menu-search": { en: "Search for food (e.g. Pizza, Dal...)", hi: "खाना खोजें (जैसे पिज्जा, दाल...)" },
  "cust-name": { en: "Your Name", hi: "आपका नाम" },
  "cust-table": { en: "Table No. / Room No.", hi: "टेबल नं. / रूम नं." },
  "cust-notes": { en: "Special Request for the Chef (e.g., less spicy, extra ketchup)", hi: "शेफ के लिए विशेष अनुरोध (जैसे कम तीखा)" }
};

// BILINGUAL MENU DATA

// Cart state
let cart = {};

function getSlug(cat){ return cat.replace(/[^a-z0-9]/gi,'_').toLowerCase(); }

function buildMenu(){
  const root = document.getElementById('menu-root');
  const tabs = document.getElementById('tabs');

  MENU_DATA.forEach((section,si)=>{
    const slug = getSlug(section.catEn);

    // Tab
    const tb = document.createElement('button');
    tb.className = 'tab-btn' + (si===0?' active':'');
    tb.dataset.en = section.catEn;
    tb.dataset.hi = section.catHi;
    tb.textContent = section.catEn;
    tb.onclick = ()=>{
      const target = document.getElementById('sec-'+slug);
      const headerOffset = 130; 
      const elementPosition = target.getBoundingClientRect().top;
      const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
      window.scrollTo({ top: offsetPosition, behavior: "smooth" });
      setTimeout(()=>setActiveTab(slug),400);
    };
    tb.dataset.slug = slug;
    tabs.appendChild(tb);

    // Section
    const sec = document.createElement('div');
    sec.className = 'menu-section';
    sec.id = 'sec-'+slug;
    sec.innerHTML = `<div class="section-title" data-en="${section.catEn}" data-hi="${section.catHi}">${section.catEn}</div><div class="section-line"></div>`;

    section.items.forEach(item=>{
      const id = section.catEn+'__'+item.nEn.replace(/\s+/g,'_');
      const row = document.createElement('div');
      row.className = 'menu-item';
      row.dataset.id = id;
      row.dataset.search = (item.nEn + ' ' + item.nHi).toLowerCase();
      
      let descEn = DESCS[section.catEn]?.en || '';
      let descHi = DESCS[section.catEn]?.hi || '';

      row.innerHTML = `
        <div class="item-veg"></div>
        <div class="item-info">
          <div class="item-name" data-en="${item.nEn}" data-hi="${item.nHi}">${item.nEn}</div>
          <div class="item-desc" data-en="${descEn}" data-hi="${descHi}">${descEn}</div>
        </div>
        <div class="item-price">₹${item.p}</div>
        <div class="item-ctrl" id="ctrl-${CSS.escape(id)}">
          <button class="add-btn" onclick="addItem('${id}',${item.p},'${item.nEn.replace(/'/g,"\\'")}','${item.nHi.replace(/'/g,"\\'")}')">+</button>
        </div>`;
      sec.appendChild(row);
    });
    root.appendChild(sec);
  });
}

function setActiveTab(slug){
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.slug===slug);
    if(b.dataset.slug===slug) b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  });
}

function addItem(id, price, nameEn, nameHi){
  if(!cart[id]) cart[id]={nameEn, nameHi, price, qty:0};
  cart[id].qty++;
  renderCtrl(id);
  updateCartBar();
}

function removeItem(id){
  if(!cart[id]) return;
  cart[id].qty--;
  if(cart[id].qty<=0) delete cart[id];
  renderCtrl(id);
  updateCartBar();
}

function renderCtrl(id){
  const el = document.getElementById('ctrl-'+CSS.escape(id));
  if(!el) return;
  const item = cart[id];
  if(!item || item.qty===0){
    const parent = el.closest('.menu-item');
    const price = parent?.querySelector('.item-price')?.textContent.replace('₹','');
    const nameEn = parent?.querySelector('.item-name')?.getAttribute('data-en').replace(/'/g,"\\'");
    const nameHi = parent?.querySelector('.item-name')?.getAttribute('data-hi').replace(/'/g,"\\'");
    el.innerHTML = `<button class="add-btn" onclick="addItem('${id}',${price||0},'${nameEn||''}','${nameHi||''}')">+</button>`;
  } else {
    el.innerHTML = `<div class="qty-ctrl">
      <button class="qty-btn" onclick="removeItem('${id}')">−</button>
      <span class="qty-num">${item.qty}</span>
      <button class="qty-btn" onclick="addItem('${id}',${item.price},'${item.nameEn.replace(/'/g,"\\'")}','${item.nameHi.replace(/'/g,"\\'")}')">+</button>
    </div>`;
  }
}

function updateCartBar(){
  const items = Object.values(cart);
  const total = items.reduce((s,i)=>s+i.price*i.qty,0);
  const count = items.reduce((s,i)=>s+i.qty,0);
  const bar = document.getElementById('cart-bar');
  
  let countText = count + (currentLang==='en' ? (count!==1?' items':' item') : ' आइटम');
  document.getElementById('cb-count').textContent = countText;
  document.getElementById('cb-total').textContent = '₹'+total;
  bar.classList.toggle('show', count>0);
}

function openCart(){
  const overlay = document.getElementById('cart-overlay');
  overlay.classList.add('show');
  renderCartList();
}

function closeCart(){
  document.getElementById('cart-overlay').classList.remove('show');
}

function renderCartList(){
  const el = document.getElementById('cart-items-list');
  const items = Object.entries(cart);
  
  if(!items.length){
    let emptyMsg = currentLang==='en' ? 'Your cart is empty' : 'आपका कार्ट खाली है';
    el.innerHTML=`<div class="cart-empty">${emptyMsg}</div>`;
    document.getElementById('cart-grand-total').textContent='₹0';
    return;
  }
  
  let html='',total=0;
  items.forEach(([id,item])=>{
    total+=item.price*item.qty;
    let dispName = currentLang==='en' ? item.nameEn : item.nameHi;
    html+=`<div class="cart-item">
      <span class="cart-item-name">${dispName}</span>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="cartRemove('${id}')">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="cartAdd('${id}')">+</button>
      </div>
      <span class="cart-item-price">₹${item.price*item.qty}</span>
    </div>`;
  });
  el.innerHTML=html;
  document.getElementById('cart-grand-total').textContent='₹'+total;
}

function buildOrderMsg(name, table, notes){
  let msg = `Hello! I want to place an order:\n\n`;
  Object.values(cart).forEach(i=>{ msg+=`• ${i.nameEn} × ${i.qty} = ₹${i.price*i.qty}\n`; });
  const total = Object.values(cart).reduce((s,i)=>s+i.price*i.qty,0);
  msg+=`\n*Total: ₹${total}*\nName: ${name}\nTable / Room: ${table}`;
  if(notes) msg+=`\n\n*Special Request:* ${notes}`;
  return msg;
}

function cartAdd(id){addItem(id,cart[id]?.price,cart[id]?.nameEn,cart[id]?.nameHi);renderCartList();}
function cartRemove(id){removeItem(id);renderCartList();}

let pendingAction = null;
function openCustomer(action){
  pendingAction = action;
  document.getElementById('cust-modal').classList.add('show');
  document.getElementById('cust-name').focus();
}

function closeCustomer(){ document.getElementById('cust-modal').classList.remove('show'); }

document.getElementById('cust-confirm').onclick = ()=>{
  const name = document.getElementById('cust-name').value.trim() || 'Guest';
  const table = document.getElementById('cust-table').value.trim() || 'N/A';
  const notes = document.getElementById('cust-notes').value.trim();
  const msg = buildOrderMsg(name, table, notes);
  
  closeCustomer();
  closeCart();
  if(pendingAction==='wa'){
    window.open('https://wa.me/918818004499?text='+encodeURIComponent(msg),'_blank');
  } else {
    window.location.href='mailto:ashokahoteljind@gmail.com?subject=New%20Food%20Order&body='+encodeURIComponent(msg);
  }
};

document.getElementById('wa-btn').onclick = ()=>{ if(!Object.keys(cart).length) return; openCustomer('wa'); };
document.getElementById('email-btn').onclick = ()=>{ if(!Object.keys(cart).length) return; openCustomer('email'); };
document.getElementById('cart-bar').onclick = openCart;
document.getElementById('cart-close').onclick = closeCart;
document.getElementById('cart-backdrop').onclick = closeCart;
document.getElementById('cust-backdrop').onclick = closeCustomer;

// DUAL SEARCH SYSTEM
const searchContainer = document.getElementById('search-container');
document.getElementById('search-toggle').onclick = () => {
  searchContainer.classList.toggle('active');
  if(searchContainer.classList.contains('active')) document.getElementById('menu-search').focus();
};

document.getElementById('menu-search').addEventListener('input', function(e) {
  const term = e.target.value.toLowerCase();
  const sections = document.querySelectorAll('.menu-section');
  sections.forEach(sec => {
    let hasVisibleItem = false;
    const items = sec.querySelectorAll('.menu-item');
    items.forEach(item => {
      if (item.dataset.search.includes(term)) {
        item.style.display = 'flex';
        hasVisibleItem = true;
      } else {
        item.style.display = 'none';
      }
    });
    sec.style.display = hasVisibleItem ? 'block' : 'none';
  });
});

// CUSTOM LANGUAGE TOGGLE
function applyLanguage() {
  document.querySelectorAll('[data-en][data-hi]').forEach(el => {
    el.textContent = el.getAttribute(`data-${currentLang}`);
  });
  for (let id in UI_LANG) {
    let el = document.getElementById(id);
    if(el) el.textContent = UI_LANG[id][currentLang];
  }
  for (let id in PLACEHOLDERS_LANG) {
    let el = document.getElementById(id);
    if(el) el.placeholder = PLACEHOLDERS_LANG[id][currentLang];
  }
  updateCartBar();
  if (document.getElementById('cart-overlay').classList.contains('show')) renderCartList();
}

document.getElementById('lang-btn').onclick = function() {
  currentLang = currentLang === 'en' ? 'hi' : 'en';
  applyLanguage();
};

const moonIcon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';

// Theme Logic
const themeBtn = document.getElementById('theme-btn');
let dark = localStorage.getItem('ashoka-theme')!=='light';
function applyTheme(){ 
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light'); 
  themeBtn.innerHTML = dark ? sunIcon : moonIcon; 
  localStorage.setItem('ashoka-theme', dark ? 'dark' : 'light'); 
}
themeBtn.onclick = ()=>{ dark=!dark; applyTheme(); };
if(localStorage.getItem('ashoka-theme')==='light'){dark=false;} applyTheme();

// Scroll spy & Smooth Header Collapse
const header = document.getElementById('main-header');
const scrollTopBtn = document.getElementById('scroll-top');

window.addEventListener('scroll', () => {
  // Collapse Header Logic
  if (window.scrollY > 10) {
    header.classList.add('scrolled');
  } else {
    header.classList.remove('scrolled');
  }
  
  // Scroll to top button visibility
  scrollTopBtn.classList.toggle('show', window.scrollY > 300);
  
  // Tab spy logic
  let active = null;
  MENU_DATA.forEach(s => {
    const slug = getSlug(s.catEn);
    const el = document.getElementById('sec-'+slug);
    if(el && el.getBoundingClientRect().top < 150) active = slug;
  });
  if(active) setActiveTab(active);
}, {passive: true});

// Initialize
buildMenu();
applyLanguage();
</script>
